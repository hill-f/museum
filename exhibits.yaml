  - id: electricity
    index: "VII"
    name: "Electricity & Telecommunications"
    era: "1800s CE"
    era_sort: 1850
    category: "The Industrial Age"
    artifact_label: "Edison carbon-filament bulb prototype — Menlo Park, 1879 (replica)"

    ascii_object: |
          ___
         /   \
        | o o |
        |  =  |
         \___/
           |
        ---|---
           |
        ========

    placard_short: >
      Electricity is so embedded in modern life that we experience its
      absence as emergency rather than normalcy. Touch to learn more.

    placard_long: >
      Electricity is not one technology but a substrate for all technologies
      that followed it. The telegraph (1837) made communication faster than
      physical transport for the first time in history. The electric light
      (1879) abolished the hard boundary between day and night, extending
      productive and social time by hours. The electric motor transferred
      the efficiency gains of the steam age into a form that could be
      miniaturized, distributed, and placed inside any device. By the early
      20th century, the electrical grid had become the invisible
      infrastructure of modern civilization — so foundational that every
      subsequent information technology (radio, telephone, television,
      computing, the internet) is, at its root, a specialized application
      of electrical engineering.

    gallery_note: >
      The "War of Currents" (1880s–90s) between Edison's DC and
      Tesla/Westinghouse's AC was not merely a business dispute — it
      was a decision about the physical architecture of civilization.
      AC won because it could be transmitted over long distances.
      The choice shaped every building, every appliance, every power
      plant built in the century that followed.

    key_figures:
      - "Michael Faraday (electromagnetic induction, 1831)"
      - "Samuel Morse (telegraph, 1837)"
      - "Thomas Edison & Nikola Tesla (light, AC/DC grid, 1880s)"

