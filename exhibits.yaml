  - id: steam_engine
    index: "VI"
    name: "The Steam Engine & Industrialization"
    era: "1760s CE"
    era_sort: 1765
    category: "The Industrial Age"
    artifact_label: "Watt's separate condenser patent model — Birmingham, 1769 (replica)"

    ascii_object: |
       ___________
      |  _     _  |
      | | |   | | |
      | |_|   |_| |
      |   \   /   |
      |    \ /    |
      |     X     |
      |    / \    |
      |___/   \___|
         |     |
       __|_____|__
      |___________|

    placard_short: >
      For all of prior history, the limiting factor in production was
      human and animal muscle. The steam engine broke that constraint
      forever. Touch to learn more.

    placard_long: >
      The steam engine is the hinge of modern economic history. Before it,
      every civilization — however sophisticated — was ultimately constrained
      by the energy output of human and animal bodies. The Newcomen engine
      (1712) and Watt's improved version (1769) substituted the latent energy
      stored in coal for the energy stored in flesh. The consequences were
      total: factory production replaced cottage industry; cities swelled as
      agricultural labor became industrial labor; railroads collapsed the
      effective distance between markets; and global trade scaled in ways
      that made colonialism systemically profitable. The steam engine also
      created, for the first time, a civilization dependent on fossil fuels —
      a dependency whose consequences are still accumulating.

    gallery_note: >
      James Watt did not invent the steam engine — he made it efficient
      enough to be economical. The separate condenser (1769) reduced fuel
      consumption by 75%. In technology, the engineering of efficiency
      is often more transformative than the original invention.

    key_figures:
      - "Thomas Newcomen (atmospheric engine, 1712)"
      - "James Watt (separate condenser, 1769)"
      - "Richard Trevithick (high-pressure engine, locomotive, 1804)"

