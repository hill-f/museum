honorable_mentions:

  - id: compass
    name: "The Compass & Navigation"
    era: "c. 1100 CE (maritime use)"
    placard_short: >
      The compass didn't just help sailors find north — it made
      sustained open-ocean navigation possible, connecting hemispheres
      that had evolved in isolation for fifty thousand years.
    key_figures: ["Zheng He", "Ferdinand Magellan", "Ibn Battuta"]
    reading:
      title: "A History of the World in Twelve Maps"
      author: "Jerry Brotton"
      year: 2012
    tags: [navigation, exploration, trade, medieval]

  - id: dna
    name: "DNA & Molecular Biology"
    era: "1953 CE"
    placard_short: >
      Watson, Crick, Franklin, and Wilkins revealed the physical
      substrate of heredity. Every subsequent advance in medicine,
      agriculture, and forensics flows from that double helix.
    key_figures: ["Rosalind Franklin", "James Watson", "Francis Crick"]
    reading:
      title: "The Eighth Day of Creation"
      author: "Horace Freeland Judson"
      year: 1979
    tags: [biological, genetics, medicine, modern, scientific]

  - id: nuclear
    name: "Nuclear Technology"
    era: "1938–1945 CE"
    placard_short: >
      Fission unlocked the energy stored in atomic nuclei — powering
      cities and threatening civilizational extinction simultaneously.
      No technology has more dramatically altered geopolitical risk.
    key_figures: ["Lise Meitner", "Enrico Fermi", "J. Robert Oppenheimer"]
    reading:
      title: "The Making of the Atomic Bomb"
      author: "Richard Rhodes"
      year: 1986
    tags: [energy, weapons, geopolitics, modern, risk]

  - id: green_revolution
    name: "The Green Revolution"
    era: "1960s–1970s CE"
    placard_short: >
      Norman Borlaug's high-yield wheat varieties, paired with synthetic
      fertilizers and irrigation, fed billions who would otherwise have
      starved — and concentrated agricultural power in ways still
      being reckoned with.
    key_figures: ["Norman Borlaug", "Fritz Haber (nitrogen fixation)", "M.S. Swaminathan"]
    reading:
      title: "The Man Who Fed the World"
      author: "Leon Hesser"
      year: 2006
    tags: [food, agriculture, modern, biological, economic]


