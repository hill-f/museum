#   placard_long   — full museum-quality paragraph (shown on inspect)
#   gallery_note   — italicized curatorial aside (optional)
#   key_figures    — list of names associated with this technology
#   predecessor_ids — exhibit ids this technology depends on
#   descendant_ids  — exhibit ids this technology enabled
