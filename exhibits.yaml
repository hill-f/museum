exhibits:

  - id: fire
    index: "I"
    name: "Fire & Controlled Combustion"
    era: "c. 400,000 BCE"
    era_sort: -400000
    category: "The Ancient Foundations"
    artifact_label: "Charred bone with ochre residue — Homo erectus hearth site"

    ascii_object: |
        )  (
       (   ) )
        ) ( (
      _______)_
   .-'---------|
  ( C|/\/\/\/\/|
   '-./\/\/\/\/|
     '_________'
      '-------'

    placard_short: >
      Before fire, humans were prey. After fire, they were the most dangerous
      species on Earth. Touch to learn more.

    placard_long: >
      Controlled combustion is the ur-technology — the one that bootstrapped
      the biological and social conditions for every other invention.
      Cooking with fire pre-digests food, releasing far more calories per
      bite and requiring dramatically less gut to process. Over hundreds of
      thousands of years, the metabolic savings migrated upward: intestines
      shrank, skulls expanded, and Homo sapiens became cognitively anomalous.
      Fire also extended the day, creating the campfire evening — the first
      protected social space in which storytelling, ritual, and myth were
      born. Every industrial technology downstream — metallurgy, ceramics,
      glass, steam, electricity, nuclear fission — is, at root, controlled
      heat applied to matter.

    gallery_note: >
      In nearly every human mythology, fire is stolen — from gods, from
      nature, hidden in fennel stalks. This is not decoration. It is a
      cultural memory of rupture: the moment we crossed a threshold we
      could never uncross.

    key_figures:
      - "Homo erectus (first evidence of controlled use)"
      - "Richard Wrangham (cooking hypothesis)"
      - "Johann Joachim Becher (phlogiston theory, 1667)"

    predecessor_ids: []
    descendant_ids: [agriculture, wheel, metallurgy, steam_engine]

    tags: [foundational, biological, social, energy, prehistoric]

    reading:
      title: "Catching Fire: How Cooking Made Us Human"
      author: "Richard Wrangham"
      year: 2009
      note: >
        The primary source for the cooking-brain hypothesis. Readable,
        provocative, and well-evidenced. Start here.

    links:
