  - id: agriculture
    index: "II"
    name: "Agriculture & Domestication"
    era: "c. 10,000 BCE"
    era_sort: -10000
    category: "The Ancient Foundations"
    artifact_label: "Obsidian sickle blade — Fertile Crescent, Neolithic period"

    ascii_object: |
         |\
         | \
         |  \___
      ___|      \
     /   \  o o  \
    |    |        |
    |____|________|
      ||||||||||||
      ||||||||||||

    placard_short: >
      Humans gave up mobility and variety for surplus and settlement.
      We have been renegotiating that bargain ever since. Touch to learn more.

    placard_long: >
      Agriculture is not simply a more efficient way to eat — it is a
      completely different relationship between humans and the land.
      By selectively cultivating grasses in the Fertile Crescent, the
      Yangtze River valley, and Mesoamerica, humans created food surpluses
      that enabled permanent settlement, population growth, occupational
      specialization, and eventually the city. It also created, for the
      first time in human history, something worth defending — and therefore
      something worth taking. Inequality, standing armies, taxation, and
      epidemic disease all followed directly from the agricultural bargain.
      The Green Revolution of the 20th century was merely agriculture's
      most recent renegotiation, feeding billions while concentrating
      agricultural power in the hands of a few.

    gallery_note: >
      Anthropologist James C. Scott argues that early states did not
      simply adopt agriculture — they imposed it, because grain is
      the only staple crop that can be easily taxed. Root crops and
      legumes resist state control. Wheat feeds armies and empires.

    key_figures:
      - "Anonymous Neolithic farmers (Fertile Crescent, c. 10,000 BCE)"
      - "Norman Borlaug (Green Revolution, 20th c.)"
      - "Nikolai Vavilov (mapped crop origins, 1920s–30s)"

