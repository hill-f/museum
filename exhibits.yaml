        type: academic

    image:
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Google_DeepMind_A100_Servers.jpg/1280px-Google_DeepMind_A100_Servers.jpg"
      source: "Wikimedia Commons (CC BY 4.0)"
      alt: "Rows of GPU servers in a data center used for AI model training"
      ascii_ramp: " .,;:clodxkO0KXN#"

