  - id: printing_press
    index: "V"
    name: "The Printing Press"
    era: "1440 CE"
    era_sort: 1440
    category: "The Knowledge Revolutions"
    artifact_label: "Movable type block set — Gutenberg-era reproduction, Mainz"

    ascii_object: |
      _____________
     |  [PRESS]   |
     |  _______   |
     | |  | |  |  |
     | |  | |  |  |
     | |__|_|__|  |
     |    |||     |
     |____|_|_____|
          |||
         _|||_

    placard_short: >
      Gutenberg's press did not simply make books cheaper — it demolished
      the institutional monopoly on truth. Touch to learn more.

    placard_long: >
      The printing press is the most instructive historical precedent for
      every subsequent information technology. It did not merely accelerate
      the distribution of existing knowledge — it destabilized the
      institutions that controlled what counted as knowledge at all.
      Within decades of Gutenberg's press (c. 1440), Martin Luther's
      95 Theses had been printed and distributed across Europe, triggering
      the Protestant Reformation and a century of religious warfare.
      The same technology that spread Lutheran pamphlets spread scientific
      treatises, vernacular literature, and eventually newspapers.
      By making literacy economically viable for the middle class, the
      press created the preconditions for the Enlightenment, the
      Scientific Revolution, and modern democracy. Every technology that
      redistributes the power to publish is, in some essential sense,
      a second printing press.

    gallery_note: >
      The Church initially welcomed the printing press as a tool for
      producing Bibles. Within 50 years, it was attempting to establish
      the Index Librorum Prohibitorum — the first large-scale information
      censorship regime in Western history.

    key_figures:
      - "Johannes Gutenberg (movable type press, c. 1440)"
      - "Bi Sheng (ceramic movable type, China, c. 1040 — 400 years earlier)"
      - "Aldus Manutius (pocket book format, Venice, 1490s)"

    predecessor_ids: [writing]
    descendant_ids: [internet]

    tags: [media, power, disruption, knowledge, early_modern]

    reading:
