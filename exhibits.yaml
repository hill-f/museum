  - id: writing
    index: "IV"
    name: "Writing & Symbolic Records"
    era: "c. 3200 BCE"
    era_sort: -3200
    category: "The Ancient Foundations"
    artifact_label: "Clay tablet with cuneiform script — Sumerian, c. 3000 BCE (replica)"

    ascii_object: |
      .-----------.
      | ||| || |  |
      | || ||| |  |
      | ||| | ||  |
      | || || |||  |
      | ||| ||| |  |
      '-----------'

    placard_short: >
      Writing is the technology that made all other technologies cumulative.
      Before it, knowledge died with its holder. Touch to learn more.

    placard_long: >
      Writing externalizes memory — it places knowledge outside any
      individual mind and makes it persistent, transmissible, and
      amendable. Before writing, every generation rebuilt its
      understanding from scratch, limited to what living teachers
      could convey. After writing, the dead could still instruct the
      living. Law, mathematics, history, science, literature, religion,
      and bureaucracy are all impossible without an external symbolic
      store. The first writing systems — Sumerian cuneiform, Egyptian
      hieroglyphics, Chinese oracle bone script — emerged independently
      from the administrative demands of complex societies: who owns
      which field, how much grain is owed, when taxes are due. The
      accounting ledger preceded the poem by centuries.

    gallery_note: >
      The oldest known writing is not literature — it is inventory.
      Uruk tablets from 3200 BCE record beer rations and grain
      allocations. Bureaucracy is older than philosophy.

    key_figures:
      - "Anonymous Sumerian scribes (c. 3200 BCE)"
      - "Sequoyah (Cherokee syllabary, 1821 — independent invention)"
      - "Jean-François Champollion (deciphered hieroglyphics, 1822)"

    predecessor_ids: [agriculture]
    descendant_ids: [printing_press, internet]

    tags: [cognitive, cultural, language, ancient, information]

    reading:
