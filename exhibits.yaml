      source: "Wikimedia Commons (Public Domain)"
      alt: "Portrait painting of Louis Pasteur in his laboratory, 1885"
      ascii_ramp: " .,;:clodxkO0KXN#"

    ambience: "laboratory quiet, glass clink, distant hospital sounds"


  - id: internet
    index: "IX"
    name: "The Internet & Networked Computing"
    era: "1969–1990s"
    era_sort: 1991
    category: "The Information Age"
    artifact_label: "IMP Interface Message Processor panel — ARPANET node 1, UCLA, 1969"

    ascii_object: |
      [PC]---[PC]
        \     /
         \   /
      [PC]-[HUB]-[PC]
         /   \
        /     \
      [SRV]--[SRV]

    placard_short: >
      For the first time in history, any human with a connection could
      publish to the entire species simultaneously. Touch to learn more.

    placard_long: >
      The internet did to the printing press what the printing press did
      to oral culture: it didn't merely accelerate the distribution of
      knowledge, it changed the fundamental nature of authorship,
      audience, and truth. ARPANET (1969) was a military research
      network designed to survive nuclear attack through distributed
      routing. Tim Berners-Lee's World Wide Web (1991) transformed it
      into a universal publishing medium. Within a decade, the barriers
      to global communication had collapsed: any individual with a
      connection could address the entire species. E-commerce restructured
      retail; social media restructured political discourse; Wikipedia
      restructured the encyclopedia; streaming restructured entertainment.
      We are still living through the consequences of this redistribution
      of the power to publish, and the institutions built on the old
      scarcity of attention have not yet found their footing.

    gallery_note: >
      The founding protocol of the internet — TCP/IP — was designed
      with openness as a core value: no central authority, no required
      identification, no gatekeeping. This architectural choice made
      the web's explosive growth possible. It also made spam, surveillance,
      and disinformation structurally difficult to prevent.

    key_figures:
      - "Vint Cerf & Bob Kahn (TCP/IP protocol, 1974)"
      - "Tim Berners-Lee (World Wide Web, 1991)"
      - "DARPA/ARPA team (ARPANET, 1969)"

    predecessor_ids: [electricity, printing_press, writing]
    descendant_ids: [ai]

    tags: [network, information, society, digital, modern]

    reading:
      title: "Where Wizards Stay Up Late: The Origins of the Internet"
      author: "Katie Hafner & Matthew Lyon"
      year: 1996
      note: >
        The ARPANET origin story, told with journalistic clarity.
        One of the best technology history books written.

    links:
      - label: "Internet Society: History of the Internet"
        url: "https://www.internetsociety.org/internet/history-internet/"
        type: institutional
      - label: "W3C: Tim Berners-Lee's Original WWW Proposal"
        url: "https://www.w3.org/History/1989/proposal.html"
        type: primary_source
      - label: "Computer History Museum: ARPANET"
        url: "https://www.computerhistory.org/internethistory/"
        type: museum

    image:
      url: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Internet_map_1024.jpg/1024px-Internet_map_1024.jpg"
      source: "Wikimedia Commons (CC BY 2.5)"
      alt: "Visualization of internet routing paths, showing interconnected nodes across a dark background"
      ascii_ramp: " .:-=+*#%@"

    ambience: "modem handshake, keyboard typing, server hum"


  - id: ai
    index: "X"
    name: "Artificial Intelligence (Large Language Models)"
    era: "2020s CE"
    era_sort: 2022
    category: "The Information Age"
    artifact_label: "GPU cluster node — transformer model training rack, 2023"
    exhibit_status: "ONGOING — exhibit record subject to revision"

    ascii_object: |
      [INPUT]
         |
      =========
      |LAYER 1|
      =========
         |
      =========
      |LAYER 2|
      =========
         |
      =========
      |LAYER N|
      =========
         |
      [OUTPUT]

    placard_short: >
      Every prior technology extended human physical capability or the
      reach of human-authored thought. This one may be different.
      Touch to learn more.

    placard_long: >
      Every technology in this hall extended what human bodies could do,
      or amplified the reach of human-authored ideas. Artificial
      intelligence — specifically the large language models that emerged
      in the early 2020s — appears to be the first technology that can
      generate novel reasoning without a human author present in the loop.
      Whether this constitutes a genuine paradigm shift or a very
      sophisticated amplification tool remains genuinely contested.
      The historical parallels are instructive but imperfect: the printing
      press redistributed who could publish; the internet redistributed
      who could be heard; AI may be redistributing who — or what — can
      think. The governance questions, the labor displacement questions,
      and the questions of what human cognition is even for in a world
      with capable AI reasoning — all remain entirely open. This exhibit
      is necessarily provisional.

    gallery_note: >
      This is the only exhibit in the Hall whose placard the museum
      cannot yet finalize. We have placed it here not because we are
      certain it belongs among these others, but because we believe
      the question deserves to be asked in this company.

    key_figures:
      - "Alan Turing (theoretical foundations, 1950)"
      - "Geoffrey Hinton, Yann LeCun, Yoshua Bengio (deep learning, 2010s)"
      - "OpenAI / Anthropic / Google DeepMind teams (LLMs, 2020s)"

    predecessor_ids: [internet, electricity, writing]
    descendant_ids: []

    tags: [cognitive, uncertain, present, reasoning, digital]

    reading:
      title: "The Alignment Problem: Machine Learning and Human Values"
      author: "Brian Christian"
      year: 2020
      note: >
        The most accessible and philosophically serious account of what
        AI systems are actually doing and why alignment matters.
        Pair with Melanie Mitchell's 'AI: A Guide for Thinking Humans'
        for a more skeptical counterpoint.

    links:
