  - id: germ_theory
    index: "VIII"
    name: "Germ Theory & Modern Medicine"
    era: "1850s CE"
    era_sort: 1860
    category: "The Scientific Age"
    artifact_label: "Louis Pasteur's swan-neck flask — Institut Pasteur, Paris (replica)"

    ascii_object: |
        ___
       /   \
      | ~~~ |
      |     |
       \___/
         |
         |  <-- sealed neck
        / \
       /   \
      |     |
      |_____|

    placard_short: >
      For most of human history, the leading causes of death were
      invisible and mysterious. Germ theory named them. Touch to learn more.

    placard_long: >
      Before germ theory, disease was explained by miasma (bad air),
      divine punishment, or humoral imbalance. Pasteur's experiments
      (1850s–1860s) and Koch's postulates (1884) established that
      specific microorganisms cause specific diseases — a conceptual
      revolution that made prevention and treatment logically possible
      for the first time. Lister's antiseptic surgery followed.
      Vaccines (building on Jenner's earlier smallpox work) were
      systematized. Antibiotics arrived in the 20th century. The
      combined effect was the most dramatic change in the baseline of
      human experience since fire: global life expectancy roughly
      doubled in under a century. The world's current population of
      eight billion is impossible without it. The COVID-19 mRNA vaccines
      (2020) represent the most recent acceleration of this centuries-long
      trajectory.

    gallery_note: >
      Ignaz Semmelweis proved in 1847 that doctors washing their hands
      between autopsies and deliveries reduced puerperal fever deaths
      from 18% to 1%. He was ridiculed by the medical establishment,
      institutionalized, and died of the same infection he had spent
      his career fighting. Institutions resist paradigm shifts even
      when the evidence is overwhelming.

    key_figures:
      - "Louis Pasteur (germ theory, pasteurization, vaccines, 1850s–80s)"
      - "Robert Koch (disease-specific pathogens, 1876–84)"
      - "Ignaz Semmelweis (hand-washing, 1847)"
      - "Alexander Fleming (penicillin, 1928)"

    predecessor_ids: [writing, electricity]
    descendant_ids: []

    tags: [biological, public_health, scientific, medicine, modern]

    reading:
      title: "The Doctor's Plague: Germs, Childbed Fever, and the Strange Story of Ignaz Semmelweis"
      author: "Sherwin B. Nuland"
      year: 2003
      note: >
