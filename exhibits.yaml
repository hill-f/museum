  - id: wheel
    index: "III"
    name: "The Wheel & Mechanical Advantage"
    era: "c. 3500 BCE"
    era_sort: -3500
    category: "The Ancient Foundations"
    artifact_label: "Tripartite wooden wheel — Mesopotamian replica, c. 3200 BCE"

    ascii_object: |
        .-""""-.
       /  o  o  \
      |  ------  |
      |  |    |  |
      |  ------  |
       \        /
        '------'
       //      \\
      //________\\

    placard_short: >
      The wheel is less an invention than an insight about rotational motion.
      That insight underlies all of mechanical engineering. Touch to learn more.

    placard_long: >
      The wheel's genius is not the circle but the axle — the fixed point
      around which rotation becomes useful work. From oxcarts to watermills
      to clockwork escapements to the turbine blade, a single geometric
      principle underlies the entirety of mechanical civilization. The wheel
      collapsed the friction between places, making long-distance trade
      economically viable for the first time. It also enabled the potter's
      wheel, which industrialized ceramic production; the water wheel, which
      harnessed river energy; and ultimately the flywheel, gear train, and
      every rotary machine thereafter. The insight that rotation can be
      captured and redirected is one of humanity's most generative.

    gallery_note: >
      The wheel was independently invented at least twice — in Mesopotamia
      and in the Indus Valley — but notably not in pre-Columbian Americas,
      where it appears in toys but not in practical use. Geography, not
      ingenuity, was often the constraint.

    key_figures:
      - "Anonymous Sumerian craftsmen (c. 3500 BCE)"
      - "Hero of Alexandria (described gear systems, c. 10–70 CE)"
      - "James Watt (flywheel governor, 1788)"

    predecessor_ids: [fire]
    descendant_ids: [steam_engine, agriculture]

    tags: [mechanical, trade, transport, prehistoric, engineering]

    reading:
